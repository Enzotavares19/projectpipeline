version: 0.2

env:
  variables:
    AWS_REGION: us-east-2
    IMAGE_TAG: latest

phases:
  pre_build:
    commands:
      - echo "Autenticando no ECR..."
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
      - REPOSITORY_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO_NAME

  build:
    commands:
      - echo "Buildando imagem Docker..."
      - docker build --no-cache -t $REPOSITORY_URI:$IMAGE_TAG .
      - echo "Build concluido"

  post_build:
    commands:
      - echo "Fazendo push para ECR..."
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - echo "Push concluido"
      - printf '[{"name":"lab-app","imageUri":"%s"}]' $REPOSITORY_URI:$IMAGE_TAG > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
    - template.yaml