AWSTemplateFormatVersion: '2010-09-09'
Description: CodePipeline que deploya EC2 via CloudFormation e testa via CodeBuild

Parameters:
  GitHubOwner:
    Type: String
    Description: Seu usuario do GitHub

  GitHubRepo:
    Type: String
    Description: Nome do repositorio

  GitHubBranch:
    Type: String
    Default: main

Resources:

  ArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms

  PipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: codepipeline-lab-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: codepipeline-lab-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:*
                Resource: !Sub arn:aws:s3:::${ArtifactBucket}/*
              - Effect: Allow
                Action:
                  - cloudformation:*
                Resource: '*'
              - Effect: Allow
                Action:
                  - codestar-connections:UseConnection
                Resource: arn:aws:codeconnections:us-east-2:311249665143:connection/d0f3f25b-f6dd-442d-9eaf-6f3fb930a717
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource:
                  - !GetAtt CloudFormationRole.Arn
                  - !GetAtt CodeBuildRole.Arn
              - Effect: Allow
                Action:
                  - codebuild:BatchGetBuilds
                  - codebuild:StartBuild
                Resource: !GetAtt TestProject.Arn

  CloudFormationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: cloudformation-lab-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: cloudformation-lab-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:*
                  - ssm:GetParameters
                Resource: '*'
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:CreateBucket
                  - s3:PutEncryptionConfiguration
                  - s3:PutBucketPolicy
                Resource: '*'

  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: codebuild-lab-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: codebuild-lab-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                Resource: !Sub arn:aws:cloudformation:us-east-2:311249665143:stack/lab-ec2-stack/*
              - Effect: Allow
                Action:
                  - ec2:DescribeInstances
                  - ec2:DescribeInstanceStatus
                Resource: '*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub arn:aws:s3:::${ArtifactBucket}/*

  NotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: lab-pipeline-notifications
      Subscription:
        - Protocol: email
          Endpoint: enzo.tavares@fulltime.com.br

  NotificationTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref NotificationTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sns:Publish
            Resource: !Ref NotificationTopic

  ApprovalEvent:
    Type: AWS::Events::Rule
    Properties:
      Name: lab-pipeline-approval
      Description: Notifica quando o pipeline aguarda aprovacao
      EventPattern:
        source:
          - aws.codepipeline
        detail-type:
          - CodePipeline Action Execution State Change
        detail:
          pipeline:
            - lab-ec2-pipeline
          state:
            - WAITING
          type:
            category:
              - Approval
      Targets:
        - Arn: !Ref NotificationTopic
          Id: ApprovalTarget
          InputTransformer:
            InputPathsMap:
              pipeline: $.detail.pipeline
              stage: $.detail.stage
            InputTemplate: '"O pipeline <pipeline> esta aguardando aprovacao manual no estagio <stage>. Acesse o console AWS para aprovar ou rejeitar."'

  FailureEvent:
    Type: AWS::Events::Rule
    Properties:
      Name: lab-pipeline-failure
      Description: Notifica quando o pipeline falha
      EventPattern:
        source:
          - aws.codepipeline
        detail-type:
          - CodePipeline Pipeline Execution State Change
        detail:
          pipeline:
            - lab-ec2-pipeline
          state:
            - FAILED
      Targets:
        - Arn: !Ref NotificationTopic
          Id: FailureTarget
          InputTransformer:
            InputPathsMap:
              pipeline: $.detail.pipeline
            InputTemplate: '"O pipeline <pipeline> falhou. Acesse o console AWS para verificar o erro."'

  SuccessEvent:
    Type: AWS::Events::Rule
    Properties:
      Name: lab-pipeline-success
      Description: Notifica quando o pipeline conclui com sucesso
      EventPattern:
        source:
          - aws.codepipeline
        detail-type:
          - CodePipeline Pipeline Execution State Change
        detail:
          pipeline:
            - lab-ec2-pipeline
          state:
            - SUCCEEDED
      Targets:
        - Arn: !Ref NotificationTopic
          Id: SuccessTarget
          InputTransformer:
            InputPathsMap:
              pipeline: $.detail.pipeline
            InputTemplate: '"O pipeline <pipeline> foi concluido com sucesso."'

  TestProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: lab-ec2-test
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
      Source:
        Type: CODEPIPELINE
        BuildSpec: buildspec.yml

  LabPipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: lab-ec2-pipeline
      RoleArn: !GetAtt PipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactBucket
      Stages:
        - Name: Source
          Actions:
            - Name: GitHubSource
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: '1'
              Configuration:
                ConnectionArn: arn:aws:codeconnections:us-east-2:311249665143:connection/d0f3f25b-f6dd-442d-9eaf-6f3fb930a717
                FullRepositoryId: !Sub ${GitHubOwner}/${GitHubRepo}
                BranchName: !Ref GitHubBranch
                OutputArtifactFormat: CODE_ZIP
              OutputArtifacts:
                - Name: SourceOutput

        - Name: Approval
          Actions:
            - Name: ManualApproval
              ActionTypeId:
                Category: Approval
                Owner: AWS
                Provider: Manual
                Version: '1'
              Configuration:
                CustomData: "Revisar o template.yaml antes de aprovar o deploy da EC2"

        - Name: Deploy
          Actions:
            - Name: DeployEC2
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CloudFormation
                Version: '1'
              Configuration:
                ActionMode: CREATE_UPDATE
                StackName: lab-ec2-stack
                TemplatePath: SourceOutput::template.yaml
                RoleArn: !GetAtt CloudFormationRole.Arn
                Capabilities: CAPABILITY_IAM
              InputArtifacts:
                - Name: SourceOutput

        - Name: Test
          Actions:
            - Name: TestEC2
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              Configuration:
                ProjectName: !Ref TestProject
              InputArtifacts:
                - Name: SourceOutput