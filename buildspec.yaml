version: 0.2

phases:
  install:
    commands:
      - echo "Instalando dependencias..."
      - pip install awscli --upgrade --quiet

  build:
    commands:
      - echo "Buscando InstanceId do stack..."
      - INSTANCE_ID=$(aws cloudformation describe-stacks --stack-name lab-ec2-stack --region us-east-2 --query "Stacks[0].Outputs[?OutputKey=='InstanceId'].OutputValue" --output text)
      - echo "Instance ID encontrado $INSTANCE_ID"

      - echo "Verificando estado da instancia..."
      - INSTANCE_STATE=$(aws ec2 describe-instances --instance-ids $INSTANCE_ID --region us-east-2 --query "Reservations[0].Instances[0].State.Name" --output text)
      - echo "Estado atual $INSTANCE_STATE"
      - test "$INSTANCE_STATE" = "running" || (echo "ERRO instancia nao esta running" && exit 1)

      - echo "Verificando status checks..."
      - STATUS_CHECK=$(aws ec2 describe-instance-status --instance-ids $INSTANCE_ID --region us-east-2 --query "InstanceStatuses[0].InstanceStatus.Status" --output text)
      - echo "Status check $STATUS_CHECK"
      - test "$STATUS_CHECK" = "ok" || (echo "ERRO status check nao passou" && exit 1)

      - echo "Verificando tag da instancia..."
      - TAG_VALUE=$(aws ec2 describe-instances --instance-ids $INSTANCE_ID --region us-east-2 --query "Reservations[0].Instances[0].Tags[?Key=='Name'].Value" --output text)
      - echo "Tag Name encontrada $TAG_VALUE"
      - test "$TAG_VALUE" = "lab-ec2-pipeline" || (echo "ERRO tag incorreta" && exit 1)

  post_build:
    commands:
      - echo "Todos os testes passaram com sucesso"