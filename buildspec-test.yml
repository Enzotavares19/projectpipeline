version: 0.2

env:
  variables:
    AWS_REGION: us-east-2

phases:
  pre_build:
    commands:
      - echo "Buscando DNS do ALB..."
      - ALB_DNS=$(aws cloudformation describe-stacks --stack-name lab-ecs-stack --region $AWS_REGION --query "Stacks[0].Outputs[?OutputKey=='ALBDnsName'].OutputValue" --output text)
      - echo "ALB DNS encontrado $ALB_DNS"

  build:
    commands:
      - echo "Aguardando ALB ficar disponivel..."
      - sleep 30

      - echo "Testando rota principal..."
      - RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" http://$ALB_DNS/)
      - echo "HTTP Status $RESPONSE"
      - test "$RESPONSE" = "200" || (echo "ERRO rota principal retornou $RESPONSE" && exit 1)

      - echo "Testando rota de health..."
      - HEALTH=$(curl -s http://$ALB_DNS/health)
      - echo "Health response $HEALTH"
      - echo $HEALTH | grep -q "healthy" || (echo "ERRO health check falhou" && exit 1)

  post_build:
    commands:
      - echo "Todos os testes passaram com sucesso"